global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: sample_project
    metrics_path: /monitoring/metrics
    static_configs:
      - targets:
          - sample_project:8000
        labels:
          service: sample_project

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090